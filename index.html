<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Không Gian Chữ Và Ảnh 3D</title>
  <style>
    :root {
      --accent: #ff3f7f;
      --accent-soft: rgba(255, 63, 127, 0.22);
      --accent-glow: rgba(255, 63, 127, 0.55);
      --ink: #fff7fb;
      --panel-border: rgba(255, 255, 255, 0.16);
      --card-font: "Quicksand", "Nunito", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      color-scheme: dark;
      font-family: var(--card-font);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 18%, var(--accent-soft), transparent 30%),
        radial-gradient(circle at 78% 22%, rgba(95, 211, 255, 0.13), transparent 28%),
        radial-gradient(circle at 50% 72%, rgba(255, 255, 255, 0.05), transparent 34%),
        linear-gradient(145deg, #060712, #111426 52%, #05060d);
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .page {
      position: relative;
      display: block;
      min-height: 100vh;
      isolation: isolate;
    }

    .starfield {
      position: fixed;
      inset: -18vh -18vw;
      z-index: -3;
      overflow: hidden;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255, 255, 255, 0.68) 0 1px, transparent 1.4px);
      background-size: 118px 118px, 190px 190px;
      animation: drift 18s linear infinite;
    }

    .starfield::selection {
      background: transparent;
    }

    .starfield::before,
    .starfield::after {
      content: "";
      position: absolute;
      inset: -20%;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.85) 0 1px, transparent 1.5px),
        radial-gradient(circle, var(--accent-glow) 0 1.4px, transparent 2px);
      background-size: 150px 150px, 230px 230px;
      animation: blinkDrift 5.2s steps(2, end) infinite;
    }

    .starfield::after {
      filter: blur(0.8px);
      opacity: 0.6;
      animation-duration: 7.4s;
      transform: rotate(11deg);
    }

    .meteor-layer {
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      overflow: hidden;
    }

    .meteor {
      position: absolute;
      top: var(--top);
      left: var(--left);
      width: var(--length);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.92), var(--accent));
      box-shadow: 0 0 18px var(--accent-glow);
      transform: rotate(138deg) translateX(-120vw);
      opacity: 0;
      animation: meteor var(--duration) linear infinite;
      animation-delay: var(--delay);
    }

    .meteor::after {
      content: "";
      position: absolute;
      right: 0;
      top: 50%;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translate(40%, -50%);
    }

    .meteor.alt {
      transform: rotate(138deg) translateX(-120vw);
      animation-name: meteorAlt;
    }

    .sidebar {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 5;
      width: min(360px, calc(100vw - 36px));
      max-height: calc(100vh - 36px);
      padding: 24px;
      background: rgba(8, 10, 20, 0.64);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      backdrop-filter: blur(18px);
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      pointer-events: auto;
      transition: width 220ms ease, height 220ms ease, padding 220ms ease;
    }

    .sidebar-toggle {
      position: absolute;
      top: 14px;
      right: 12px;
      z-index: 3;
      appearance: none;
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 0;
      border-radius: 0;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .sidebar-toggle::before {
      content: "<";
      font-size: 16px;
      line-height: 1;
    }

    .page.is-collapsed .sidebar {
      width: 58px;
      height: 58px;
      padding: 58px 10px 14px;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
      backdrop-filter: none;
      overflow: hidden;
    }

    .page.is-collapsed .sidebar-toggle {
      left: 17px;
      right: auto;
    }

    .page.is-collapsed .sidebar-toggle::before {
      content: ">";
    }

    .music-float-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 6;
      display: none;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(18px);
      cursor: pointer;
    }

    .music-float-toggle:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .page.is-collapsed .music-float-toggle {
      display: grid;
    }

    .music-float-toggle .music-icon {
      width: 0;
      height: 0;
      margin-left: 3px;
      border-top: 8px solid transparent;
      border-bottom: 8px solid transparent;
      border-left: 12px solid currentColor;
    }

    .music-float-toggle.is-playing .music-icon {
      position: relative;
      width: 13px;
      height: 15px;
      margin-left: 0;
      border: 0;
    }

    .music-float-toggle.is-playing .music-icon::before,
    .music-float-toggle.is-playing .music-icon::after {
      content: "";
      position: absolute;
      top: 0;
      width: 4px;
      height: 15px;
      border-radius: 2px;
      background: currentColor;
    }

    .music-float-toggle.is-playing .music-icon::before {
      left: 1px;
    }

    .music-float-toggle.is-playing .music-icon::after {
      right: 1px;
    }

    .sidebar-content {
      max-height: calc(100vh - 118px);
      margin-top: 34px;
      overflow-y: auto;
      padding-right: 2px;
      transition: opacity 160ms ease, transform 180ms ease;
    }

    .page.is-collapsed .sidebar-content {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-10px);
    }

    .brand {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1;
      letter-spacing: 0;
    }

    .subhead {
      margin: 0 0 24px;
      color: rgba(255, 247, 251, 0.72);
      line-height: 1.55;
    }

    .controls {
      display: grid;
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      color: rgba(255, 247, 251, 0.82);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    textarea,
    input[type="text"],
    input[type="file"],
    select {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, background 180ms ease;
    }

    textarea {
      min-height: 132px;
      resize: vertical;
      padding: 12px;
      line-height: 1.45;
    }

    input[type="text"],
    input[type="file"],
    select {
      padding: 11px 12px;
    }

    select {
      color: var(--ink);
      background-color: rgba(16, 18, 34, 0.96);
    }

    option {
      color: #111827;
      background: #ffffff;
    }

    textarea:focus,
    input[type="text"]:focus,
    input[type="file"]:focus,
    select:focus {
      border-color: var(--accent);
      background: rgba(255, 255, 255, 0.11);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .color-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .swatch {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      background: var(--swatch);
    }

    .color-native {
      width: 46px;
      height: 42px;
      padding: 3px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .image-list {
      display: grid;
      gap: 8px;
    }

    .image-item {
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 7px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .image-item img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      object-fit: cover;
    }

    .image-name {
      min-width: 0;
      overflow: hidden;
      color: rgba(255, 247, 251, 0.84);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-image {
      min-height: 30px;
      padding: 0 9px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
    }

    .audio-panel {
      display: grid;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
    }

    .audio-title {
      min-width: 0;
      overflow: hidden;
      color: rgba(255, 247, 251, 0.84);
      font-size: 12px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    audio {
      width: 100%;
      height: 34px;
    }

    .music-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn {
      min-height: 42px;
      border: 1px solid transparent;
      border-radius: 8px;
      color: white;
      background: var(--accent);
      cursor: pointer;
      font-weight: 750;
      transition: transform 160ms ease, filter 160ms ease, background 160ms ease;
    }

    .btn:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    .btn.secondary {
      border-color: var(--panel-border);
      background: rgba(255, 255, 255, 0.08);
    }

    .stage-wrap {
      position: fixed;
      inset: -40vh -40vw;
      display: grid;
      min-width: 0;
      place-items: center;
      padding: 0;
      perspective: 2200px;
      perspective-origin: 50% 50%;
      overflow: visible;
      touch-action: none;
      cursor: grab;
    }

    .stage-wrap::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 44%, rgba(0, 0, 0, 0.14) 76%, rgba(0, 0, 0, 0.48) 100%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.28), transparent 18%, transparent 82%, rgba(0, 0, 0, 0.28));
      animation: nebulaShift 12s ease-in-out infinite alternate;
    }

    .stage-wrap::after {
      content: "";
      position: fixed;
      inset: -20%;
      pointer-events: none;
      background:
        radial-gradient(circle at 30% 35%, rgba(255, 63, 127, 0.11), transparent 28%),
        radial-gradient(circle at 68% 55%, rgba(76, 201, 240, 0.1), transparent 30%);
      filter: blur(10px);
      animation: auroraFloat 16s ease-in-out infinite alternate;
    }

    .stage-wrap:active {
      cursor: grabbing;
    }

    .hint {
      position: absolute;
      right: 24px;
      bottom: 20px;
      max-width: min(420px, calc(100% - 48px));
      color: rgba(255, 247, 251, 0.7);
      font-size: 13px;
      line-height: 1.45;
      text-align: right;
      pointer-events: none;
    }

    .scene {
      position: relative;
      width: 220vw;
      height: 220vh;
      min-width: 220vw;
      min-height: 220vh;
      transform-style: preserve-3d;
      transform: rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) rotateZ(var(--rz, 0deg));
    }

    .ring {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transform: translate3d(var(--flow-x, 0px), var(--flow-y, 0px), 0) rotateZ(var(--idle-tilt, 0deg));
      will-change: transform;
    }

    .phrase {
      position: absolute;
      left: 50%;
      top: 50%;
      width: max-content;
      max-width: min(300px, 44vw);
      padding: 5px 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(9, 10, 19, 0.42)),
        radial-gradient(circle at 20% 20%, var(--accent-soft), transparent 58%);
      box-shadow:
        0 0 16px var(--accent-soft),
        inset 0 0 12px rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      font-family: var(--card-font);
      font-size: clamp(10px, 1vw, 15px);
      font-weight: 500;
      line-height: 1.28;
      letter-spacing: 0.01em;
      text-align: center;
      overflow-wrap: anywhere;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.48),
        0 0 18px var(--accent-glow);
      transform:
        translate(-50%, -50%)
        translate3d(var(--x), var(--y), var(--z))
        rotateX(var(--tilt))
        rotateY(var(--turn))
        rotateZ(calc(var(--roll) + var(--spin, 0deg)))
        translateZ(0.1px);
      opacity: var(--opacity);
      filter: saturate(1.08);
      backface-visibility: visible;
      transform-style: preserve-3d;
      will-change: transform;
      animation: cardBreathe var(--breathe-speed, 5s) ease-in-out infinite alternate;
      animation-delay: var(--breathe-delay, 0s);
      user-select: none;
    }

    .photo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: clamp(86px, 11vw, 150px);
      aspect-ratio: 4 / 5;
      padding: 7px;
      border: 1px solid rgba(255, 255, 255, 0.36);
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.12);
      box-shadow:
        0 0 30px var(--accent-soft),
        0 24px 70px rgba(0, 0, 0, 0.42);
      transform:
        translate(-50%, -50%)
        translate3d(var(--x), var(--y), var(--z))
        rotateX(var(--tilt))
        rotateY(var(--turn))
        rotateZ(calc(var(--roll) + var(--spin, 0deg)))
        translateZ(0.1px);
      opacity: var(--opacity);
      backface-visibility: visible;
      transform-style: preserve-3d;
      will-change: transform;
      animation: cardBreathe var(--breathe-speed, 5s) ease-in-out infinite alternate;
      animation-delay: var(--breathe-delay, 0s);
      user-select: none;
      pointer-events: none;
    }

    .spark {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: white;
      box-shadow: 0 0 12px var(--accent-glow);
      transform: translate(-50%, -50%) translate3d(var(--x), var(--y), var(--z));
      animation: phraseBlink var(--speed) steps(2, end) infinite;
      animation-delay: var(--delay);
    }

    @keyframes phraseBlink {
      0%,
      100% {
        opacity: 0.62;
        filter: saturate(0.8);
      }
      45% {
        opacity: 1;
        filter: saturate(1.35);
      }
      52% {
        opacity: 0.35;
      }
      58% {
        opacity: 1;
      }
    }

    @keyframes blink {
      0%,
      100% {
        opacity: 0.28;
      }
      50% {
        opacity: 0.95;
      }
    }

    @keyframes meteor {
      0% {
        opacity: 0;
        transform: rotate(138deg) translateX(-120vw);
      }
      8% {
        opacity: 1;
      }
      42% {
        opacity: 0;
        transform: rotate(138deg) translateX(120vw);
      }
      100% {
        opacity: 0;
        transform: rotate(138deg) translateX(120vw);
      }
    }

    @keyframes nebulaShift {
      from {
        opacity: 0.72;
        transform: scale(1);
      }
      to {
        opacity: 1;
        transform: scale(1.04) translate3d(-1.5%, 1%, 0);
      }
    }

    @keyframes auroraFloat {
      from {
        transform: translate3d(-2%, -1%, 0) rotate(0deg);
        opacity: 0.65;
      }
      to {
        transform: translate3d(2%, 2%, 0) rotate(5deg);
        opacity: 0.95;
      }
    }

    @keyframes cardBreathe {
      from {
        filter: saturate(0.96) brightness(0.96);
      }
      to {
        filter: saturate(1.18) brightness(1.08);
      }
    }

    @keyframes meteorAlt {
      0% {
        opacity: 0;
        transform: rotate(138deg) translateX(-120vw);
      }
      8% {
        opacity: 1;
      }
      42% {
        opacity: 0;
        transform: rotate(138deg) translateX(120vw);
      }
      100% {
        opacity: 0;
        transform: rotate(138deg) translateX(120vw);
      }
    }

    @keyframes drift {
      from {
        background-position: 0 0, 0 0;
      }
      to {
        background-position: -220px 220px, -160px 180px;
      }
    }

    @keyframes blinkDrift {
      0%,
      100% {
        opacity: 0.24;
        background-position: 0 0, 0 0;
      }
      50% {
        opacity: 0.95;
        background-position: -120px 120px, -90px 110px;
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: hidden;
      }

      .sidebar {
        top: 10px;
        left: 10px;
        width: min(360px, calc(100vw - 20px));
        max-height: calc(100vh - 20px);
      }

      .page.is-collapsed .sidebar {
        padding: 58px 10px 10px;
      }

      .sidebar-content {
        max-height: calc(100vh - 102px);
      }

      .page.is-collapsed .sidebar-toggle {
        left: 17px;
        right: auto;
      }

      .music-float-toggle {
        top: 10px;
        right: 10px;
      }

      .stage-wrap {
        min-height: 220vh;
        padding: 0;
      }

      .scene {
        width: 220vw;
        height: 220vh;
        min-width: 220vw;
        min-height: 220vh;
      }

      .hint {
        left: 18px;
        right: 18px;
        bottom: 14px;
        text-align: center;
      }

      .phrase {
        max-width: min(240px, 58vw);
        backdrop-filter: none;
        box-shadow: 0 0 10px var(--accent-soft);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.42);
        animation: none;
      }

      .photo {
        box-shadow: 0 0 14px var(--accent-soft);
        animation: none;
      }

      .ring {
        animation: none;
      }

      .stage-wrap::after {
        display: none;
      }

      .meteor {
        opacity: 0.72;
      }
    }
  </style>
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>
  <div class="meteor-layer" aria-hidden="true">
    <i class="meteor" style="--top: -8%; --left: 96%; --length: 170px; --duration: 6.8s; --delay: -1.4s;"></i>
    <i class="meteor" style="--top: 6%; --left: 112%; --length: 125px; --duration: 8.2s; --delay: -4.6s;"></i>
    <i class="meteor" style="--top: 24%; --left: 104%; --length: 200px; --duration: 7.4s; --delay: -2.8s;"></i>
    <i class="meteor" style="--top: 42%; --left: 118%; --length: 145px; --duration: 9.5s; --delay: -6.2s;"></i>
    <i class="meteor" style="--top: -14%; --left: 128%; --length: 110px; --duration: 5.8s; --delay: -0.8s;"></i>
    <i class="meteor" style="--top: 16%; --left: 124%; --length: 185px; --duration: 7.9s; --delay: -5.4s;"></i>
    <i class="meteor" style="--top: 32%; --left: 132%; --length: 135px; --duration: 6.5s; --delay: -3.7s;"></i>
    <i class="meteor" style="--top: 58%; --left: 110%; --length: 165px; --duration: 8.8s; --delay: -7.1s;"></i>
    <i class="meteor" style="--top: 72%; --left: 122%; --length: 115px; --duration: 6.9s; --delay: -2.2s;"></i>
    <i class="meteor alt" style="--top: -14%; --left: 48%; --length: 150px; --duration: 7.2s; --delay: -1.9s;"></i>
    <i class="meteor alt" style="--top: -10%; --left: 58%; --length: 105px; --duration: 6.1s; --delay: -4.1s;"></i>
    <i class="meteor alt" style="--top: -18%; --left: 38%; --length: 175px; --duration: 8.6s; --delay: -5.8s;"></i>
    <i class="meteor alt" style="--top: -6%; --left: 66%; --length: 130px; --duration: 7.7s; --delay: -2.6s;"></i>
  </div>
  <main class="page is-collapsed" id="page">
    <aside class="sidebar">
      <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Mở bảng tùy chỉnh" aria-expanded="false"></button>
      <div class="sidebar-content">
        <h1 class="brand">Love Space</h1>
        <p class="subhead">Tạo không gian chữ và ảnh 3D, xoay toàn cảnh liên tục bằng chuột hoặc thao tác chạm.</p>

        <section class="controls" aria-label="Tùy chỉnh thiệp">
          <div class="field">
            <label for="phrases">Cụm từ</label>
            <textarea id="phrases" spellcheck="false">Always with you
Forever yours
Our little universe
Only for you
Sweet moment
You are my star
Endless love
Dreaming of us</textarea>
          </div>

          <div class="field">
            <label for="newPhrase">Thêm nhanh</label>
            <div class="row">
              <input id="newPhrase" type="text" placeholder="Nhập một cụm từ mới">
              <button class="btn" id="addPhrase" type="button">Thêm</button>
            </div>
          </div>

          <div class="field">
            <label for="imageUpload">Ảnh</label>
            <input id="imageUpload" type="file" accept="image/*" multiple>
            <div class="image-list" id="imageList"></div>
          </div>

          <div class="field">
            <label for="musicUpload">Nhạc nền</label>
            <input id="musicUpload" type="file" accept="audio/*">
            <div class="audio-panel">
              <div class="audio-title" id="musicTitle">default-music.mp3</div>
              <audio id="musicPlayer" src="default-music.mp3" controls loop preload="metadata"></audio>
              <div class="music-actions">
                <button class="btn" id="musicToggle" type="button">Play</button>
                <button class="btn secondary" id="musicRestart" type="button">Restart</button>
              </div>
            </div>
          </div>

          <div class="field">
            <label for="fontSelect">Font chữ</label>
            <select id="fontSelect">
              <option value='"Quicksand", "Nunito", "Segoe UI", ui-sans-serif, system-ui, sans-serif'>Quicksand</option>
              <option value='"Nunito", "Segoe UI", ui-sans-serif, system-ui, sans-serif'>Nunito</option>
              <option value='"Segoe UI", ui-sans-serif, system-ui, sans-serif'>Segoe UI</option>
              <option value='Georgia, "Times New Roman", serif'>Georgia</option>
              <option value='"Trebuchet MS", "Segoe UI", ui-sans-serif, sans-serif'>Trebuchet</option>
            </select>
          </div>

          <div class="field">
            <label>Màu chủ đạo</label>
            <div class="color-grid" id="swatches"></div>
            <div class="row">
              <input id="customColor" type="text" value="#ff3f7f" aria-label="Mã màu chủ đạo">
              <input class="color-native" id="nativeColor" type="color" value="#ff3f7f" aria-label="Chọn màu chủ đạo">
            </div>
          </div>

          <div class="actions">
            <button class="btn" id="apply" type="button">Cập nhật</button>
            <button class="btn secondary" id="shuffle" type="button">Đổi vị trí</button>
            <button class="btn secondary" id="fullscreen" type="button">Full</button>
          </div>
        </section>
      </div>
    </aside>

    <button class="music-float-toggle" id="floatingMusicToggle" type="button" aria-label="Play music">
      <span class="music-icon" aria-hidden="true"></span>
    </button>

    <section class="stage-wrap" id="stageWrap" aria-label="Không gian chữ và ảnh 3D">
      <div class="scene" id="scene">
        <div class="ring" id="phraseRing"></div>
      </div>
      <div class="hint">Kéo để trượt qua một dải chữ 3D theo một chiều. Thu gọn bảng bên trái để dùng toàn màn hình.</div>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const page = document.getElementById("page");
    const scene = document.getElementById("scene");
    const stageWrap = document.getElementById("stageWrap");
    const sidebarToggle = document.getElementById("sidebarToggle");
    const phraseRing = document.getElementById("phraseRing");
    const phrasesInput = document.getElementById("phrases");
    const newPhraseInput = document.getElementById("newPhrase");
    const imageUpload = document.getElementById("imageUpload");
    const imageList = document.getElementById("imageList");
    const musicUpload = document.getElementById("musicUpload");
    const musicPlayer = document.getElementById("musicPlayer");
    const musicTitle = document.getElementById("musicTitle");
    const musicToggle = document.getElementById("musicToggle");
    const floatingMusicToggle = document.getElementById("floatingMusicToggle");
    const musicRestart = document.getElementById("musicRestart");
    const fontSelect = document.getElementById("fontSelect");
    const addPhraseButton = document.getElementById("addPhrase");
    const applyButton = document.getElementById("apply");
    const shuffleButton = document.getElementById("shuffle");
    const fullscreenButton = document.getElementById("fullscreen");
    const swatches = document.getElementById("swatches");
    const customColor = document.getElementById("customColor");
    const nativeColor = document.getElementById("nativeColor");

    const palette = ["#ff3f7f", "#ff6b4a", "#ffd166", "#36d399", "#4cc9f0", "#b96dff"];
    let rotation = { x: 0, y: 0, z: 0 };
    let dragState = null;
    let inertiaFrame = null;
    let velocity = { x: 0, y: 0, z: 0 };
    let layoutSeed = 0;
    const defaultImageSvg = `
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 600">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#ff7ac8"/>
            <stop offset="0.48" stop-color="#7c5cff"/>
            <stop offset="1" stop-color="#1dd3ff"/>
          </linearGradient>
          <radialGradient id="glow" cx="50%" cy="42%" r="58%">
            <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
            <stop offset="0.38" stop-color="#ffd6f0" stop-opacity="0.38"/>
            <stop offset="1" stop-color="#050713" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <rect width="480" height="600" rx="34" fill="#080914"/>
        <rect x="18" y="18" width="444" height="564" rx="28" fill="url(#bg)" opacity="0.36"/>
        <circle cx="240" cy="250" r="180" fill="url(#glow)"/>
        <path d="M240 390c-75-58-128-105-128-166 0-42 30-72 70-72 25 0 47 13 58 33 11-20 33-33 58-33 40 0 70 30 70 72 0 61-53 108-128 166z" fill="#fff" opacity="0.9"/>
        <g fill="#fff" opacity="0.72">
          <circle cx="90" cy="92" r="4"/>
          <circle cx="388" cy="118" r="3"/>
          <circle cx="398" cy="438" r="5"/>
          <circle cx="84" cy="500" r="3"/>
          <circle cx="146" cy="428" r="2"/>
          <circle cx="336" cy="504" r="2"/>
        </g>
      </svg>`;
    let uploadedImages = [{
      name: "Default cosmic love",
      url: `data:image/svg+xml;charset=utf-8,${encodeURIComponent(defaultImageSvg)}`
    }];
    let uploadedMusicUrl = "";
    let pan = { x: 0, y: 0 };
    let spin = 0;
    let renderFrame = null;
    let lastRenderPan = { x: 0, y: 0 };
    let flowFrame = null;
    let lastFlowTime = 0;
    let flowOffset = { x: 0, y: 0, tilt: 0 };

    function hexToRgb(hex) {
      const value = hex.replace("#", "").trim();
      const normalized = value.length === 3
        ? value.split("").map((part) => part + part).join("")
        : value;
      const number = Number.parseInt(normalized, 16);
      if (Number.isNaN(number) || normalized.length !== 6) return null;
      return {
        r: (number >> 16) & 255,
        g: (number >> 8) & 255,
        b: number & 255
      };
    }

    function setAccent(hex) {
      const rgb = hexToRgb(hex);
      if (!rgb) return;
      const raw = hex.replace("#", "").trim();
      const expanded = raw.length === 3
        ? raw.split("").map((part) => part + part).join("")
        : raw.slice(0, 6);
      const normalized = `#${expanded}`;
      root.style.setProperty("--accent", normalized);
      root.style.setProperty("--accent-soft", `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.22)`);
      root.style.setProperty("--accent-glow", `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.55)`);
      customColor.value = normalized;
      nativeColor.value = normalized;
    }

    function getPhrases() {
      return phrasesInput.value
        .split("\n")
        .map((phrase) => phrase.trim())
        .filter(Boolean);
    }

    function positiveModulo(value, size) {
      return ((value % size) + size) % size;
    }

    function seededIndex(x, y, layer, length) {
      if (!length) return 0;
      const value = Math.abs((x * 73856093) ^ (y * 19349663) ^ (layer * 83492791) ^ (layoutSeed * 2654435761));
      return value % length;
    }

    function isMobileViewport() {
      return window.innerWidth <= 820;
    }

    function placeSpaceElement(item, x, y, z, seed) {
      const isMobile = isMobileViewport();
      const tilt = z < 0 ? -1.5 : 1.5;
      const turn = z < 0 ? -2.5 : 2.5;
      const roll = isMobile ? 6 : 10;
      const opacity = 0.66 + positiveModulo(seed * 37, 22) / 100;
      item.style.setProperty("--x", `${x}px`);
      item.style.setProperty("--y", `${y}px`);
      item.style.setProperty("--z", `${z}px`);
      item.style.setProperty("--tilt", `${tilt}deg`);
      item.style.setProperty("--turn", `${turn}deg`);
      item.style.setProperty("--roll", `${roll}deg`);
      item.style.setProperty("--spin", `0deg`);
      item.style.setProperty("--opacity", opacity.toFixed(2));
      item.style.setProperty("--breathe-speed", `${4.2 + positiveModulo(seed, 7) * 0.45}s`);
      item.style.setProperty("--breathe-delay", `${positiveModulo(seed, 11) * -0.18}s`);
    }

    function renderPhrases() {
      renderFrame = null;
      lastRenderPan = { x: pan.x, y: pan.y };
      const phrases = getPhrases();
      phraseRing.innerHTML = "";
      if (!phrases.length && !uploadedImages.length) return;

      const isMobile = isMobileViewport();
      const cellX = isMobile
        ? Math.max(160, Math.min(225, window.innerWidth * 0.48))
        : Math.max(270, Math.min(380, window.innerWidth * 0.22));
      const cellY = isMobile
        ? Math.max(74, Math.min(110, window.innerHeight * 0.12))
        : Math.max(105, Math.min(150, window.innerHeight * 0.15));
      const cols = Math.ceil(window.innerWidth / cellX) + (isMobile ? 10 : 18);
      const rows = Math.ceil(window.innerHeight / cellY) + (isMobile ? 10 : 16);
      const layers = isMobile ? [-110, 0, 110] : [-220, -110, 0, 110, 220];
      const offsetX = positiveModulo(pan.x, cellX);
      const offsetY = positiveModulo(pan.y, cellY);
      const baseCol = Math.floor(pan.x / cellX);
      const baseRow = Math.floor(pan.y / cellY);
      const startCol = -Math.ceil(cols / 2);
      const startRow = -Math.ceil(rows / 2);

      layers.forEach((z, layerIndex) => {
        for (let rowIndex = 0; rowIndex < rows; rowIndex += 1) {
          for (let colIndex = 0; colIndex < cols; colIndex += 1) {
            const col = startCol + colIndex;
            const row = startRow + rowIndex;
            const worldCol = baseCol + col;
            const worldRow = baseRow + row;
            const seed = worldCol * 31 + worldRow * 47 + layerIndex * 71;
            const depthScale = 0.94 + layerIndex * 0.025;
            const diagonalShift = row * (isMobile ? 18 : 64) * depthScale;
            const stagger = positiveModulo(worldRow, 2) * cellX * (isMobile ? 0.12 : 0.32);
            const x = (col * cellX - offsetX + diagonalShift + stagger) * depthScale + (layerIndex % 2) * (isMobile ? 18 : 34);
            const y = (row * cellY - offsetY) * depthScale;
            const shouldPlaceImage = uploadedImages.length && positiveModulo(seed, isMobile ? 37 : 23) === 0;

            if (shouldPlaceImage) {
              const image = uploadedImages[seededIndex(worldCol, worldRow, layerIndex, uploadedImages.length)];
              const item = document.createElement("img");
              item.className = "photo";
              item.src = image.url;
              item.alt = image.name;
              placeSpaceElement(item, x, y, z, seed);
              phraseRing.appendChild(item);
              continue;
            }

            if (phrases.length && positiveModulo(worldCol + worldRow + layerIndex, isMobile ? 3 : 4) === 0) {
              const item = document.createElement("span");
              item.className = "phrase";
              item.textContent = phrases[seededIndex(worldCol, worldRow, layerIndex, phrases.length)];
              placeSpaceElement(item, x, y, z, seed);
              phraseRing.appendChild(item);
            }
          }
        }
      });

      const sparkCount = isMobile ? 5 : 14;
      for (let i = 0; i < sparkCount; i += 1) {
        const spark = document.createElement("i");
        const seed = i + Math.floor(pan.x * 0.04) + Math.floor(pan.y * 0.04) + layoutSeed * 19;
        spark.className = "spark";
        spark.style.setProperty("--x", `${positiveModulo(seed * 97, window.innerWidth + 500) - 250}px`);
        spark.style.setProperty("--y", `${positiveModulo(seed * 53, window.innerHeight + 500) - 250}px`);
        spark.style.setProperty("--z", `${-900 + positiveModulo(seed * 41, 1350)}px`);
        spark.style.setProperty("--speed", `${1.7 + (i % 6) * 0.32}s`);
        spark.style.setProperty("--delay", `${i * -0.11}s`);
        phraseRing.appendChild(spark);
      }
    }

    function renderImageList() {
      imageList.innerHTML = "";

      if (!uploadedImages.length) {
        const empty = document.createElement("div");
        empty.className = "image-name";
        empty.textContent = "Chưa có ảnh nào";
        imageList.appendChild(empty);
        return;
      }

      uploadedImages.forEach((image, index) => {
        const item = document.createElement("div");
        item.className = "image-item";

        const preview = document.createElement("img");
        preview.src = image.url;
        preview.alt = image.name;

        const name = document.createElement("div");
        name.className = "image-name";
        name.textContent = image.name;

        const remove = document.createElement("button");
        remove.className = "remove-image";
        remove.type = "button";
        remove.textContent = "Xóa";
        remove.addEventListener("click", () => {
          const [removed] = uploadedImages.splice(index, 1);
          if (removed?.url.startsWith("blob:")) {
            URL.revokeObjectURL(removed.url);
          }
          renderImageList();
          renderPhrases();
        });

        item.append(preview, name, remove);
        imageList.appendChild(item);
      });
    }

    function scheduleRender() {
      if (renderFrame) return;
      if (isMobileViewport() && dragState) return;
      const threshold = 28;
      if (Math.abs(pan.x - lastRenderPan.x) < threshold && Math.abs(pan.y - lastRenderPan.y) < threshold) return;
      renderFrame = requestAnimationFrame(renderPhrases);
    }

    function updateRotation() {
      scene.style.setProperty("--rx", `${rotation.x}deg`);
      scene.style.setProperty("--ry", `${rotation.y}deg`);
      scene.style.setProperty("--rz", `${rotation.z || 0}deg`);
    }

    function stopInertia() {
      if (inertiaFrame) {
        cancelAnimationFrame(inertiaFrame);
        inertiaFrame = null;
      }
      velocity = { x: 0, y: 0, z: 0 };
    }

    function beginDrag(event) {
      stopInertia();
      pan.x -= flowOffset.x;
      pan.y -= flowOffset.y;
      flowOffset = { x: 0, y: 0, tilt: flowOffset.tilt };
      phraseRing.style.setProperty("--flow-x", "0px");
      phraseRing.style.setProperty("--flow-y", "0px");
      renderPhrases();
      stageWrap.setPointerCapture(event.pointerId);
      dragState = {
        lastX: event.clientX,
        lastY: event.clientY
      };
    }

    function moveDrag(event) {
      if (!dragState) return;
      const dx = event.clientX - dragState.lastX;
      const dy = event.clientY - dragState.lastY;
      rotation.y += dx * 0.18;
      rotation.x -= dy * 0.18;
      velocity.y = dx * 0.08;
      velocity.x = dy * -0.04;
      velocity.z = dy * 0.01;
      dragState.lastX = event.clientX;
      dragState.lastY = event.clientY;
      updateRotation();

      if (!isMobileViewport()) {
        pan.x += dx;
        pan.y += dy;
        scheduleRender();
      }
    }

    function endDrag(event) {
      if (dragState) {
        stageWrap.releasePointerCapture(event.pointerId);
      }
      dragState = null;
    }

    function flow(time) {
      if (!lastFlowTime) lastFlowTime = time;
      const delta = Math.min(40, time - lastFlowTime);
      lastFlowTime = time;

      if (!dragState) {
        flowOffset.x -= delta * 0.012;
        flowOffset.y += delta * 0.015;
        flowOffset.tilt = Math.sin(time * 0.00035) * 0.45;
        phraseRing.style.setProperty("--flow-x", `${flowOffset.x}px`);
        phraseRing.style.setProperty("--flow-y", `${flowOffset.y}px`);
        phraseRing.style.setProperty("--idle-tilt", `${flowOffset.tilt}deg`);

        const flowRenderDistance = isMobileViewport() ? 420 : 180;
        if (Math.abs(flowOffset.x) > flowRenderDistance || Math.abs(flowOffset.y) > flowRenderDistance) {
          pan.x -= flowOffset.x;
          pan.y -= flowOffset.y;
          flowOffset = { x: 0, y: 0, tilt: flowOffset.tilt };
          phraseRing.style.setProperty("--flow-x", "0px");
          phraseRing.style.setProperty("--flow-y", "0px");
          renderPhrases();
        }
      }

      flowFrame = requestAnimationFrame(flow);
    }

    palette.forEach((color) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "swatch";
      button.dataset.color = color;
      button.style.setProperty("--swatch", color);
      button.setAttribute("aria-label", `Chọn màu ${color}`);
      button.addEventListener("click", () => setAccent(color));
      swatches.appendChild(button);
    });

    addPhraseButton.addEventListener("click", () => {
      const value = newPhraseInput.value.trim();
      if (!value) return;
      phrasesInput.value = `${phrasesInput.value.trim()}\n${value}`.trim();
      newPhraseInput.value = "";
      renderPhrases();
    });

    newPhraseInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        addPhraseButton.click();
      }
    });

    applyButton.addEventListener("click", renderPhrases);
    shuffleButton.addEventListener("click", () => {
      layoutSeed += 1;
      renderPhrases();
    });

    fullscreenButton.addEventListener("click", async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.warn("Fullscreen is not available in this browser.", error);
      }
      window.setTimeout(renderPhrases, 120);
    });

    customColor.addEventListener("change", () => setAccent(customColor.value));
    nativeColor.addEventListener("input", () => setAccent(nativeColor.value));

    fontSelect.addEventListener("change", () => {
      root.style.setProperty("--card-font", fontSelect.value);
    });

    imageUpload.addEventListener("change", () => {
      const newImages = [...imageUpload.files].map((file) => ({
        name: file.name,
        url: URL.createObjectURL(file)
      }));
      uploadedImages = [...uploadedImages, ...newImages];
      imageUpload.value = "";
      renderImageList();
      renderPhrases();
    });

    musicUpload.addEventListener("change", async () => {
      const file = musicUpload.files?.[0];
      if (!file) return;

      if (uploadedMusicUrl) {
        URL.revokeObjectURL(uploadedMusicUrl);
      }

      uploadedMusicUrl = URL.createObjectURL(file);
      musicPlayer.src = uploadedMusicUrl;
      musicPlayer.loop = true;
      musicTitle.textContent = file.name;
      musicUpload.value = "";

      try {
        await musicPlayer.play();
      } catch (error) {
        console.warn("Audio playback requires a user gesture in this browser.", error);
      }
    });

    async function toggleMusic() {
      if (musicPlayer.paused) {
        try {
          await musicPlayer.play();
        } catch (error) {
          console.warn("Audio playback requires a user gesture in this browser.", error);
        }
      } else {
        musicPlayer.pause();
      }
    }

    musicToggle.addEventListener("click", toggleMusic);
    floatingMusicToggle.addEventListener("click", toggleMusic);

    musicRestart.addEventListener("click", async () => {
      musicPlayer.currentTime = 0;
      try {
        await musicPlayer.play();
      } catch (error) {
        console.warn("Audio playback requires a user gesture in this browser.", error);
      }
    });

    musicPlayer.addEventListener("play", () => {
      musicToggle.textContent = "Pause";
      floatingMusicToggle.classList.add("is-playing");
      floatingMusicToggle.setAttribute("aria-label", "Pause music");
    });

    musicPlayer.addEventListener("pause", () => {
      musicToggle.textContent = "Play";
      floatingMusicToggle.classList.remove("is-playing");
      floatingMusicToggle.setAttribute("aria-label", "Play music");
    });

    sidebarToggle.addEventListener("click", () => {
      const isCollapsed = page.classList.toggle("is-collapsed");
      sidebarToggle.setAttribute("aria-expanded", String(!isCollapsed));
      sidebarToggle.setAttribute("aria-label", isCollapsed ? "Mở bảng tùy chỉnh" : "Thu gọn bảng tùy chỉnh");
      window.setTimeout(renderPhrases, 240);
    });

    stageWrap.addEventListener("pointerdown", beginDrag);
    stageWrap.addEventListener("pointermove", moveDrag);
    stageWrap.addEventListener("pointerup", endDrag);
    stageWrap.addEventListener("pointercancel", endDrag);
    window.addEventListener("resize", renderPhrases);

    setAccent(palette[0]);
    renderImageList();
    renderPhrases();
    updateRotation();
    flowFrame = requestAnimationFrame(flow);
  </script>
</body>
</html>
